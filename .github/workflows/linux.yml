name: "Linux DEB Test Build"

on: workflow_dispatch

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ubuntu-24.04-x86_64-unknown-linux-gnu-deb

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libopenblas-dev \
            libx11-dev \
            libxtst-dev \
            libxrandr-dev \
            libgtk-layer-shell0 \
            libgtk-layer-shell-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            vulkan-tools \
            glslc

      - name: Verify Vulkan toolchain
        run: |
          command -v glslc
          ldconfig -p | grep -q "libvulkan.so"

      - name: Verify gtk-layer-shell runtime dependency
        run: |
          dpkg-query -W -f='${Status}\n' libgtk-layer-shell0 | grep -q "install ok installed"
          ldconfig -p | grep -q "libgtk-layer-shell.so.0"

      - name: Install frontend dependencies
        run: bun install

      - name: Disable updater artifacts for test build
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          config_path = Path("src-tauri/tauri.conf.json")
          config = json.loads(config_path.read_text(encoding="utf-8"))
          config.setdefault("bundle", {})["createUpdaterArtifacts"] = False
          config_path.write_text(json.dumps(config, indent=2) + "\n", encoding="utf-8")
          print("Set bundle.createUpdaterArtifacts=false for this CI run")
          PY

      - name: Build DEB bundle
        env:
          WHISPER_NO_AVX: ON
          WHISPER_NO_AVX2: ON
        run: bun run tauri build --bundles deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: handy-ubuntu-deb-test
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
